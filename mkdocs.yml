site_name: SampleBlog
site_description: A modern blog built with MkDocs Material - responsive, accessible, and beautiful.
site_author: SampleBlog
site_url: https://gpalauh.github.io/SampleBlog/

repo_name: gpalauh/SampleBlog
repo_url: https://github.com/gpalauh/SampleBlog
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono

  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - header.autohide
    - announce.dismiss
    - toc.follow

  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - blog:
      blog_dir: blog
      blog_toc: true
      post_date_format: long
      post_url_format: "{date}/{slug}"
      archive: true
      archive_name: Archive
      archive_date_format: yyyy
      categories: true
      categories_name: Categories
      authors: true
      authors_file: blog/.authors.yml
      pagination: true
      pagination_per_page: 5
      draft: true
      draft_on_serve: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      title: On this page
  - tables
  - footnotes
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gpalauh/SampleBlog
      name: GitHub
  analytics:
    provider: google
    property: !ENV [GOOGLE_ANALYTICS_KEY, ""]
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our website. With your consent, you're
      helping us to make our documentation better.

nav:
  - Home: index.md
  - Blog: blog/index.md
  - Contact: contact.md

copyright: >
  Copyright &copy; 2024 SampleBlog –
  <a href="#__consent">Change cookie settings</a>
